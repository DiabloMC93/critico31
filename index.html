<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Ventilación Mecánica e Intubación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; /* Slate 950 */
            color: #f1f5f9;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8); /* Slate 900 */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .option-btn:hover:not(:disabled) {
            background-color: rgba(51, 65, 85, 0.8);
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }

        .correct {
            background-color: #064e3b !important;
            border-color: #10b981 !important;
            color: #d1fae5 !important;
        }

        .incorrect {
            background-color: #450a0a !important;
            border-color: #ef4444 !important;
            color: #fee2e2 !important;
        }

        #next-btn {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl">
        <!-- Pantalla del Test -->
        <div id="quiz-screen">
            <!-- Cabecera de Stats -->
            <div class="flex justify-between items-end mb-8 px-2">
                <div class="flex gap-4">
                    <div class="glass-card px-5 py-3 rounded-2xl border-green-500/20 text-center min-w-[110px]">
                        <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold block mb-1">Aciertos</span>
                        <span id="score-correct" class="text-2xl font-bold text-green-400">0</span>
                    </div>
                    <div class="glass-card px-5 py-3 rounded-2xl border-red-500/20 text-center min-w-[110px]">
                        <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold block mb-1">Errores</span>
                        <span id="score-incorrect" class="text-2xl font-bold text-red-400">0</span>
                    </div>
                </div>
                <div class="text-right">
                    <span id="question-index" class="text-xs font-bold text-blue-400 uppercase tracking-tighter bg-blue-500/10 px-3 py-1.5 rounded-lg border border-blue-500/20">
                        Cargando...
                    </span>
                </div>
            </div>

            <!-- Pregunta -->
            <div class="glass-card p-8 md:p-10 rounded-3xl mb-8 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-cyan-600"></div>
                
                <h2 id="question-text" class="text-xl md:text-2xl font-medium mb-10 text-slate-100 leading-snug">
                    Cargando pregunta...
                </h2>
                
                <div id="options-container" class="grid gap-3">
                    <!-- Opciones dinámicas -->
                </div>
            </div>
            
            <div class="flex justify-center">
                <button id="next-btn" onclick="quiz.next()" class="hidden bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-bold transition-all transform active:scale-95">
                    Siguiente Pregunta
                </button>
            </div>
        </div>

        <!-- Pantalla Final -->
        <div id="result-screen" class="hidden glass-card p-12 rounded-3xl text-center">
            <div class="w-20 h-20 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold mb-2 text-white">¡Módulo Completado!</h2>
            <p class="text-slate-400 mb-10">Has finalizado el repaso sobre Ventilación Mecánica.</p>
            
            <div class="grid grid-cols-2 gap-6 mb-12">
                <div class="p-6 bg-slate-900/50 rounded-2xl border border-green-500/20">
                    <p class="text-green-500 text-xs font-bold uppercase mb-2">Aciertos</p>
                    <p id="final-correct" class="text-5xl font-bold text-green-400">0</p>
                </div>
                <div class="p-6 bg-slate-900/50 rounded-2xl border border-red-500/20">
                    <p class="text-red-500 text-xs font-bold uppercase mb-2">Errores</p>
                    <p id="final-incorrect" class="text-5xl font-bold text-red-400">0</p>
                </div>
            </div>
            
            <button onclick="location.reload()" class="w-full bg-slate-800 hover:bg-slate-700 text-white px-8 py-4 rounded-2xl font-bold transition-all border border-slate-700">
                Reiniciar Test
            </button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "1. ¿Cuáles son las relaciones de inspiración/espiración?", a: ["2:2 ; 3:3", "1:2, 1:3", "2:1 ; 3:1", "No hay relación, son independientes"], c: 1 },
            { q: "2. ¿Cuál no es una complicación en la intubación endotraqueal?", a: ["Intubación selectiva bronquio derecho", "Autoextubación", "Excesiva presión del neumo (>25 mm Hg)", "Lesión traumática de la cabeza"], c: 3 },
            { q: "3. ¿Qué es el trigger?", a: ["Sensibilidad del respirador para iniciar la inspiración", "Presión positiva al final de la expiración", "Velocidad de entrada de aire inspiratorio en un tiempo", "Controlar la entrada de gas en la inspiración"], c: 0 },
            { q: "4. Valores de la frecuencia respiratoria:", a: ["Volumen de aire espirado en un minuto (VM= Fr x VC)", "Volumen de aire espirado en un hora (VM= Fr x VC)", "Volumen de aire espirado en un día (VM= Fr x VC)", "Volumen de aire espirado (VM= Fr x VC)"], c: 0 },
            { q: "5. ¿Cómo puede ser la variable de ciclado?", a: ["Puede ser de presión, flujo o tiempo", "Puede ser de volumen, flujo o tiempo", "Puede ser de volumen, presión, flujo o tiempo", "Puede ser de volumen, presión o flujo"], c: 2 },
            { q: "6. ¿Qué puede provocar una presión baja en vías respiratorias?", a: ["Fuga en el balón del T", "Demanda respiratorio del paciente no excede del flujo suministrado", "Paciente conectado al respirador", "Valor erróneo: el límite de la alarma excede la presión de inspiración"], c: 0 },
            { q: "7. ¿Cuál es la fracción inspiratoria de oxígeno?", a: ["FiO2", "PEEP", "Flujo espiratorio", "Flujo inspiratorio"], c: 0 },
            { q: "8. ¿Qué puede provocar una presión alta en vías respiratorias?", a: ["No tos en el ciclo inspiratorio", "Tubuladura recta o sin agua en su interior", "Paciente adaptado (respira coordinadamente)", "Tapón de moco en el tubo"], c: 3 },
            { q: "9. ¿Cómo es el ciclo de los respiradores manométricos?", a: ["Ciclados por volumen", "Ciclado por tiempo", "Ciclados por presión", "Ciclado por espacio"], c: 2 },
            { q: "10. ¿Quién controla la entrada de gas en la inspiración?", a: ["Variable de límite o control", "Trigger", "Variable de ciclado", "Flujo respiratorio"], c: 0 },
            { q: "11. ¿Quién proporciona una mezcla de O2 y aire comprimido?", a: ["FiO2 (Mezclador/Blender)", "PEEP", "Flujo espiratorio", "Flujo inspiratorio"], c: 0 },
            { q: "12. ¿Qué NO puede provocar una presión alta en vías respiratorias?", a: ["Un paciente que no tose.", "Tubuladura doblada o agua en su interior", "Paciente desadaptado (respira espontáneamente)", "Tubo obstruido (tapón moco, mordido, ...)"], c: 0 },
            { q: "13. ¿Qué es la PEEP?", a: ["Sensibilidad del respirador para iniciar la inspiración", "Presión positiva al final de la expiración", "Velocidad de entrada de aire inspiratorio en un tiempo", "Controlar la entrada de gas en la inspiración"], c: 1 },
            { q: "14. ¿Qué materiales no se necesitan para la intubación endotraqueal?", a: ["Fiador TET", "Lubricante hidrosoluble", "Jeringa 20 cc", "Paño estéril"], c: 2 },
            { q: "15. ¿Cuáles son los tipos de ventilación no mecánica invasiva?", a: ["Máscaras nasales", "Máscaras faciales", "Mascarilla total facial", "Todas las anteriores"], c: 3 },
            { q: "16. ¿Qué función tiene la variable de ciclado?", a: ["Su función es finalizar la inspiración", "Su función es finalizar la espiración", "Su función es finalizar la respiración", "Su función es finalizar la aportación de O2"], c: 0 },
            { q: "17. ¿Por qué hay que respirar profundo en la extubación endotraqueal?", a: ["Abre las cuerdas vocales y no evita traumatismos", "Cierra las cuerdas vocales y evita traumatismos", "Abre las cuerdas vocales y evita traumatismos", "Cierra las cuerdas vocales y no evita traumatismos"], c: 2 },
            { q: "18. ¿Cuándo hay riesgo de barotrauma en la PEEP?", a: ["> 15 cm de H2O", "> 5 cm de H2O", "> 10 cm de H2O", "> 3 cm de H2O"], c: 2 },
            { q: "19. ¿Dónde se realiza la traqueotomía definitiva?", a: ["Se realiza en la cama de traumatología", "Se realiza en la cama de UCI", "Se realiza en la cama de quirófano", "Se realiza en la cama del paciente"], c: 2 },
            { q: "20. ¿Cómo puede ser el trigger?", a: ["Puede ser de presión, flujo o tiempo", "Puede ser de volumen, flujo o tiempo", "Puede ser de volumen, presión, flujo o tiempo", "Puede ser de volumen, presión o flujo"], c: 2 },
            { q: "21. ¿Cuál es el flujo respiratorio?", a: ["Sensibilidad del respirador para iniciar la inspiración", "Presión positiva al final de la expiración", "Velocidad de entrada de aire inspiratorio en un tiempo", "Controlar la entrada de gas en la inspiración"], c: 2 },
            { q: "22. ¿Qué tipo de respirador se usa en niños?", a: ["Volumétricos", "Manométricos", "Nanométricos", "No se usa respirador"], c: 1 },
            { q: "23. ¿Qué es la intubación endotraqueal?", a: ["Método de sustitución para la apertura de la vía aérea", "Método de elección para la apertura de la vía aérea", "Método de elección para la apertura y aislamiento de la vía aérea", "Método de elección para el cierre y aislamiento de la vía aérea"], c: 2 },
            { q: "24. ¿Qué tipo de respirador se usa en adultos?", a: ["Volumétricos", "Manométricos", "Nanométricos", "No se usa respirador"], c: 0 },
            { q: "25. ¿Cuál no es una complicación de la VM?", a: ["Atelectasias", "Barotrauma", "Disminución de la presión intraalveolar", "Disminución del gasto cardiaco, arritmias, hipotensión"], c: 2 }
        ];

        class Quiz {
            constructor() {
                this.currentIdx = 0;
                this.correct = 0;
                this.incorrect = 0;
                this.answered = false;
            }

            init() {
                this.renderQuestion();
            }

            renderQuestion() {
                this.answered = false;
                const q = questions[this.currentIdx];
                document.getElementById('question-index').innerText = `Pregunta ${this.currentIdx + 1} de ${questions.length}`;
                document.getElementById('question-text').innerText = q.q;
                document.getElementById('next-btn').classList.add('hidden');
                
                const container = document.getElementById('options-container');
                container.innerHTML = '';

                q.a.forEach((option, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full text-left p-5 rounded-2xl font-medium text-slate-300';
                    btn.innerText = option;
                    btn.onclick = () => this.checkAnswer(idx, btn);
                    container.appendChild(btn);
                });
            }

            checkAnswer(idx, btn) {
                if (this.answered) return;
                this.answered = true;
                
                const correctIdx = questions[this.currentIdx].c;
                const buttons = document.querySelectorAll('.option-btn');
                
                if (idx === correctIdx) {
                    this.correct++;
                    btn.classList.add('correct');
                    document.getElementById('score-correct').innerText = this.correct;
                } else {
                    this.incorrect++;
                    btn.classList.add('incorrect');
                    buttons[correctIdx].classList.add('correct');
                    document.getElementById('score-incorrect').innerText = this.incorrect;
                }

                buttons.forEach(b => b.disabled = true);
                document.getElementById('next-btn').classList.remove('hidden');
            }

            next() {
                this.currentIdx++;
                if (this.currentIdx < questions.length) {
                    this.renderQuestion();
                } else {
                    this.finish();
                }
            }

            finish() {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('final-correct').innerText = this.correct;
                document.getElementById('final-incorrect').innerText = this.incorrect;
            }
        }

        const quiz = new Quiz();
        window.onload = () => quiz.init();
    </script>
</body>
</html>
